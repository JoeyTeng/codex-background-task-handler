name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: Release tag to build, for example v0.1.0
        required: true
        default: v0.1.0
        type: string
      publish:
        description: Publish or update the GitHub Release
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref_name || github.event.inputs.version }}
  cancel-in-progress: false

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.version) || github.ref }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: ${{ matrix.target }}

      - name: Validate release version
        id: meta
        shell: bash
        env:
          RELEASE_INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "push" ]]; then
            tag="${GITHUB_REF_NAME}"
          else
            tag="${RELEASE_INPUT_VERSION}"
          fi
          if [[ ! "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "release tag must look like vX.Y.Z: ${tag}" >&2
            exit 1
          fi
          version="${tag#v}"
          cargo_version="$(sed -n 's/^version = "\([^"]*\)"/\1/p' Cargo.toml | head -n 1)"
          if [[ "${cargo_version}" != "${version}" ]]; then
            echo "Cargo.toml version ${cargo_version} does not match tag ${tag}" >&2
            exit 1
          fi
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --locked --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --locked

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package release asset
        shell: bash
        run: |
          set -euo pipefail
          asset="cbth-${{ steps.meta.outputs.tag }}-${{ matrix.target }}"
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/cbth" "dist/${asset}"
          chmod 0755 "dist/${asset}"
          (cd dist && shasum -a 256 "${asset}" > "${asset}.sha256")

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: cbth-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || inputs.publish
    permissions:
      contents: write

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: JoeyTeng/codex-background-task-handler
          RELEASE_INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "push" ]]; then
            tag="${GITHUB_REF_NAME}"
          else
            tag="${RELEASE_INPUT_VERSION}"
          fi
          if [[ ! "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "release tag must look like vX.Y.Z: ${tag}" >&2
            exit 1
          fi
          cat > release-notes.md <<EOF
          cbth ${tag}

          Supported assets:
          - cbth-${tag}-x86_64-unknown-linux-gnu
          - cbth-${tag}-aarch64-apple-darwin

          Install with:

              curl -fsSL https://raw.githubusercontent.com/JoeyTeng/codex-background-task-handler/HEAD/scripts/install.sh | sh
          EOF
          if gh release view "${tag}" >/dev/null 2>&1; then
            gh release upload "${tag}" dist/* --clobber
          else
            gh release create "${tag}" dist/* --title "${tag}" --notes-file release-notes.md --verify-tag
          fi
