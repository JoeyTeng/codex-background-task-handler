name: Codex Review Gate

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  workflow_dispatch:
    inputs:
      pull_request:
        description: Pull request number to gate
        required: true
        type: number

permissions:
  contents: read
  issues: write
  pull-requests: write
  statuses: write

concurrency:
  group: codex-review-gate-${{ github.event.pull_request.number || github.event.inputs.pull_request || github.run_id }}
  cancel-in-progress: true

jobs:
  codex-review-gate:
    name: codex/review-gate runner
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout trusted gate script
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Wait for Codex review
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_API_URL: ${{ github.api_url }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.inputs.pull_request }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          MAX_WAIT_SECONDS: "1800"
          POLL_INTERVAL_SECONDS: "30"
        run: node .github/scripts/codex-review-gate.mjs
